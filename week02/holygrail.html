<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Derek Temblor | Holy Grail Example</title>
        <meta name="description" content="A common layout on the web called the 'holy grail">
        <meta name="author" content="Derek Temblor">

    </head>
    <body>
        <!-- 
            2. <header> & <h1>
        -->
        <header>
            <h1>A Holy Grail Layout Example</h1>
        </header>

        <!--
            3. <nav> & <ul>
        -->
        <nav>
            <ul>
                <li><a href="https://www.google.com/search?q=holy+grail+grants+wishes">
                    Holy Grail grants wishes</a></li>
                <li><a href="https://www.google.com/search?q=holy+grail+is+a+cup+that+can+fill+water">
                    Grail is a cup that can fill water</a></li>



            </ul>
        </nav>

        <!--
            4. <main> containing <section>, <h2>, <section>, and <article>
        -->
        <main>
            <section>
                <h2>Article 1</h2>
                <article>Lorem ipsum, I am a 5 sentence paragraph.</article>
            </section>
            <section>
                <h2>Article 2</h2>
                <article>Lorem ipsum, I am a another 5 sentence paragraph.</article>
            </section>

        </main>

        <!--
            5. <aside> & <img="" a;t="" width="">
        -->
        <aside>
            <img src="https://assets.churchofjesuschrist.org/80/13/80131e9fd33f22f54df8a0ca5f02e89a6e38d929/water_cup.jpeg" 
            alt="This cup is a representation of a grail" width="200">

        </aside>

        <!--
            6. <footer> 
        -->
        <footer>
            | Derek Temblor |
        </footer>

    </body>


</html>
