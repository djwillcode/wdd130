<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>
<body>
    <h1>WDD 130 | HTML Form - User Poll</h1>
    <form>
        
        <fieldset>
            <legend>Contact Information</legend>
            <div class="form-item column1">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullanme">
            </div>
            <div class="form-item column1">
                <label for="useremail">Email:</label>
                <input type="email" id="useremail" name="useremail">
            </div>
        </fieldset>

        <!-- adlib -->
        <br>
        <fieldset>
            <legend>Questions</legend>
            <div class="form-item column2">
                <label for="browser">What is your favorite internet browser?:</label>
                <select id="browser">
                    <option selected value="chrome">Chrome</option>
                    <option value="opera">Opera</option>
                    <option value="firefox">Firefox</option>
                </select>
            </div>
            <div class="form-item column2">
                <label for="pet">Do you have a household pet?</label>
                <input type="checkbox" id="pet">
            </div>
            <div class="form-item column2">
                <label for="pet">Do you have a household pet?</label>
                <input type="checkbox" id="pet">
            </div>
            <label for="message">List the places you have lived:</label>
            <textarea id="message">Philippines, Afghanistan, America, North Korea</textarea>
        </fieldset>
        <div class="button">
            <button type="submit">Submit Poll</button>
        </div>

    </form>
    <footer>
        &copy;2023 | HTML Form - User Poll Activity | Derek Temblor
    </footer>
</body>
</html>
